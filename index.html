<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Expense Tracker | Maaheer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #4f46e5;
            --secondary: #10b981;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            padding: 15px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .full-width { grid-column: span 2; }

        h2 { margin-top: 0; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .total-box {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .total-amount { font-size: 2.2rem; font-weight: bold; margin: 5px 0; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        button.add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        .person-tag {
            font-size: 0.75rem;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width total-box">
        <p>Total Family Expenses</p>
        <div class="total-amount" id="totalDisplay">₹0</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Add Transaction</h2>
        
        <label>Evarikosam? (Person Name)</label>
        <input type="text" id="person" placeholder="e.g., Self, Wife, Babu, Mother">
        
        <label>Reason (Deniki?)</label>
        <input type="text" id="reason" placeholder="e.g., Milk, Toys, Petrol">
        
        <label>Amount (Entha?)</label>
        <input type="number" id="amount" placeholder="₹">
        
        <label>Category</label>
        <select id="category">
            <option value="Household">Household (Inti kharchulu)</option>
            <option value="Personal">Personal</option>
            <option value="Kids">Kids (Pillala kosam)</option>
            <option value="Health">Health/Medical</option>
            <option value="Entertainment">Entertainment</option>
        </select>
        
        <button class="add-btn" onclick="saveData()">Add to List</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-chart-pie"></i> Spending Analysis</h2>
        <canvas id="myChart" height="250"></canvas>
    </div>

    <div class="card full-width">
        <h2><i class="fas fa-history"></i> Recent Transactions</h2>
        <div id="historyList"></div>
        <button onclick="resetData()" style="margin-top:20px; background:none; border:none; color:#94a3b8; cursor:pointer; font-size:12px;">Delete All History</button>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('family_tracker')) || [];
    let chartInstance = null;

    function saveData() {
        const person = document.getElementById('person').value;
        const reason = document.getElementById('reason').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;

        if(!person || !reason || !amount) return alert("Anni details fill cheyandi!");

        entries.push({ id: Date.now(), person, reason, amount, category, date: new Date().toLocaleDateString() });
        localStorage.setItem('family_tracker', JSON.stringify(entries));
        
        // Inputs clear cheyadam
        document.getElementById('reason').value = '';
        document.getElementById('amount').value = '';
        
        updateUI();
    }

    function deleteItem(id) {
        entries = entries.filter(item => item.id !== id);
        localStorage.setItem('family_tracker', JSON.stringify(entries));
        updateUI();
    }

    function resetData() {
        if(confirm("Motham data tholaginchala?")) {
            entries = [];
            localStorage.clear();
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('historyList');
        const totalDisp = document.getElementById('totalDisplay');
        list.innerHTML = '';
        
        let total = 0;
        let chartData = {};

        entries.slice().reverse().forEach(item => {
            total += item.amount;
            
            // Chart logic (By Category)
            chartData[item.category] = (chartData[item.category] || 0) + item.amount;

            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div>
                    <strong>${item.reason}</strong> <span class="person-tag">${item.person}</span><br>
                    <small style="color:#64748b">${item.date} | ${item.category}</small>
                </div>
                <div style="font-weight:bold;">
                    ₹${item.amount} 
                    <i class="fas fa-trash" style="color:#f87171; margin-left:10px; cursor:pointer;" onclick="deleteItem(${item.id})"></i>
                </div>
            `;
            list.appendChild(div);
        });

        totalDisp.innerText = `₹${total}`;
        drawChart(chartData);
    }

    function drawChart(data) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    data: Object.values(data),
                    backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    updateUI();
</script>

</body>
</html>
