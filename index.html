<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker | Maaheer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .full-width { grid-column: span 2; }

        h2 { margin-top: 0; font-size: 1.2rem; color: var(--primary); }

        .balance-display {
            font-size: 2rem;
            font-weight: bold;
            color: #ef4444;
            margin: 10px 0;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        .delete-btn { color: #ef4444; cursor: pointer; border: none; background: none; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width" style="text-align: center;">
        <h2>Total Expenses (Ee Month)</h2>
        <div class="balance-display" id="totalBalance">₹0</div>
    </div>

    <div class="card">
        <h2>Add New Expense</h2>
        <input type="text" id="reason" placeholder="Item Name (e.g. Petrol)">
        <input type="number" id="amount" placeholder="Amount (e.g. 500)">
        <select id="category">
            <option value="Food">Food</option>
            <option value="Travel">Travel/Petrol</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills/Recharge</option>
            <option value="Others">Others</option>
        </select>
        <button onclick="addEntry()">Add Entry</button>
    </div>

    <div class="card">
        <h2>Expense Breakdown</h2>
        <canvas id="expenseChart"></canvas>
    </div>

    <div class="card full-width">
        <h2>Recent History</h2>
        <div id="historyList" class="history-list"></div>
        <button onclick="clearAll()" style="background:#94a3b8; margin-top:10px; font-size: 11px;">Reset All Data</button>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('my_expenses')) || [];
    let myChart;

    function addEntry() {
        const reason = document.getElementById('reason').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;

        if(!reason || !amount) return alert("Details enter cheyandi!");

        expenses.push({ id: Date.now(), reason, amount, category });
        updateUI();
        
        document.getElementById('reason').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteEntry(id) {
        expenses = expenses.filter(e => e.id !== id);
        updateUI();
    }

    function clearAll() {
        if(confirm("Motham data delete cheyala?")) {
            expenses = [];
            updateUI();
        }
    }

    function updateUI() {
        localStorage.setItem('my_expenses', JSON.stringify(expenses));
        
        // Update List
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let total = 0;
        
        const catTotals = { Food: 0, Travel: 0, Shopping: 0, Bills: 0, Others: 0 };

        expenses.reverse().forEach(e => {
            total += e.amount;
            catTotals[e.category] += e.amount;
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span><b>${e.reason}</b> (${e.category})</span>
                <span>₹${e.amount} <button class="delete-btn" onclick="deleteEntry(${e.id})"><i class="fas fa-times"></i></button></span>
            `;
            list.appendChild(div);
        });
        expenses.reverse(); // Reset order for logic

        document.getElementById('totalBalance').innerText = `₹${total}`;
        updateChart(catTotals);
    }

    function updateChart(data) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    data: Object.values(data),
                    backgroundColor: ['#fbbf24', '#3b82f6', '#ec4899', '#10b981', '#94a3b8']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    // Start UI
    updateUI();
</script>

</body>
</html>
